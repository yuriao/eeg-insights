name: Weekly EEG Analysis

on:
  schedule:
    - cron: '0 6 * * 1'   # Every Monday 6 AM UTC
  workflow_dispatch:
    inputs:
      dataset:
        description: 'Dataset ID (leave blank for random)'
        required: false
        default: ''
      all_subjects:
        description: 'Run all subjects? (true/false)'
        required: false
        default: 'false'

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: pipeline/requirements.txt

      - name: Install Python dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Run analysis
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          MNE_DATA: /tmp/mne_data
        run: |
          mkdir -p /tmp/mne_data
          DATASET="${{ github.event.inputs.dataset }}"
          ALL_SUBJ="${{ github.event.inputs.all_subjects }}"

          if [ -n "$DATASET" ]; then
            ARGS="--dataset $DATASET"
          else
            ARGS="--auto"
          fi

          if [ "$ALL_SUBJ" = "true" ]; then
            ARGS="$ARGS --all-subjects"
          fi

          python pipeline/analyze.py $ARGS

      - name: Commit results
        run: |
          git config user.name  "EEG Insights Bot"
          git config user.email "bot@eeg-insights"
          git add posts/ frontend/public/
          git diff --staged --quiet || git commit -m "analysis: $(date +%Y-%m-%d) automated EEG report"
          git push
