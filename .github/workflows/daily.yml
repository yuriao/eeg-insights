name: Daily EEG Analysis

on:
  schedule:
    - cron: '0 8 * * *'   # Every day at 8:00 AM UTC
  workflow_dispatch:
    inputs:
      dataset:
        description: 'Dataset ID (leave blank for auto rotation)'
        required: false
        default: ''
      algo:
        description: 'Algorithm ID (leave blank for auto rotation)'
        required: false
        default: ''
      all_subjects:
        description: 'Run all subjects? (true/false)'
        required: false
        default: 'false'
      custom_analysis:
        description: 'Name of custom analysis (from custom_analyses.json)'
        required: false
        default: ''
      rerun_slug:
        description: 'Slug of existing report to re-run'
        required: false
        default: ''

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: pipeline/requirements.txt

      - name: Install Python dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Run analysis
        env:
          OPENAI_API_KEY:   ${{ secrets.OPENAI_API_KEY }}
          MOONSHOT_API_KEY: ${{ secrets.MOONSHOT_API_KEY }}
          OPENAI_BASE_URL:  ${{ secrets.OPENAI_BASE_URL }}
          MNE_DATA: /tmp/mne_data
        run: |
          mkdir -p /tmp/mne_data

          ARGS=""
          [ -n "${{ github.event.inputs.dataset }}" ]        && ARGS="$ARGS --dataset ${{ github.event.inputs.dataset }}"
          [ -z "${{ github.event.inputs.dataset }}" ]        && ARGS="$ARGS --auto"
          [ "${{ github.event.inputs.all_subjects }}" = "true" ] && ARGS="$ARGS --all-subjects"
          [ -n "${{ github.event.inputs.algo }}" ]           && ARGS="$ARGS --algo ${{ github.event.inputs.algo }}"
          [ -n "${{ github.event.inputs.custom_analysis }}" ] && ARGS="$ARGS --custom ${{ github.event.inputs.custom_analysis }}"
          [ -n "${{ github.event.inputs.rerun_slug }}" ]     && ARGS="$ARGS --rerun-slug ${{ github.event.inputs.rerun_slug }}"

          python pipeline/analyze.py $ARGS

      - name: Commit results
        run: |
          git config user.name  "EEG Insights Bot"
          git config user.email "bot@eeg-insights"
          # Stage all generated files
          git add posts/ frontend/public/ pipeline/rotation_state.json 2>/dev/null || true
          # Show what changed (debug)
          git diff --staged --stat || true
          # Commit only if there are staged changes
          if ! git diff --staged --quiet; then
            git commit -m "analysis: $(date +%Y-%m-%d) automated EEG report"
            # Pull rebase to avoid conflicts if main was updated concurrently
            git pull --rebase origin main || true
            git push
          else
            echo "No changes to commit — post may already exist for today"
          fi
